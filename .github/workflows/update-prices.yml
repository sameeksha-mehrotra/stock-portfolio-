name: Update Stock Prices

on:
  schedule:
    # 9:35 PM UTC = 5:35 PM ET — runs 5 min after US market close, Mon–Fri
    - cron: '35 21 * * 1-5'
  workflow_dispatch:   # Allow manual trigger from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit prices.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch latest stock prices
        run: python scripts/fetch_prices.py

      - name: Commit and push updated prices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No price changes detected — nothing to commit."
          else
            git commit -m "chore: update stock prices $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
